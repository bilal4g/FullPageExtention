<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FullPage Studio</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="url(#lg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><defs><linearGradient id="lg" x1="0" y1="0" x2="24" y2="24"><stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/><path d="M8 14h8"/></svg>
        <h1>FullPage Studio</h1>
      </div>
      <div class="subtitle">Capture, edit, and hand clean math to any AI</div>
    </div>

    <button id="cap-full" class="primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M4 10h16"/><path d="M12 14v4"/></svg>
      Capture full page
    </button>
    <button id="cap-visible" class="secondary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/></svg>
      Capture visible area
    </button>

    <div class="divider"></div>

    <button id="open-studio" class="ghost">Open Studio (last capture)</button>
    <button id="open-settings" class="ghost">Settings</button>

    <div id="status" class="status">Ready. Capture opens the Studio automatically.</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
