<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FullPage Studio</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="pop">
    <div class="head">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="url(#g)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><defs><linearGradient id="g" x1="0" y1="0" x2="24" y2="24"><stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/><path d="M8 14h8"/></svg>
        <h1>FullPage <b>Studio</b></h1>
      </div>
    </div>

    <!-- Capture view -->
    <div id="view-capture" class="view active">
      <button id="cap-full" class="btn primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M4 10h16"/><path d="M4 15h16"/></svg>
        Capture full page
      </button>
      <button id="cap-visible" class="btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
        Capture visible area
      </button>
      <button id="open-settings" class="btn ghost">More settings</button>
      <p id="cap-status" class="status">Pick a capture to start.</p>
    </div>

    <!-- Progress view -->
    <div id="view-progress" class="view">
      <div class="spinner"></div>
      <p id="prog-status" class="status">Capturing…</p>
    </div>

    <!-- Result view -->
    <div id="view-result" class="view">
      <div class="preview"><img id="preview-img" alt="capture preview" /></div>
      <div id="result-meta" class="meta"></div>

      <div class="seg">
        <span class="seg-label">Format</span>
        <div class="seg-btns">
          <button class="seg-btn active" data-fmt="png">PNG</button>
          <button class="seg-btn" data-fmt="jpg">JPG</button>
          <button class="seg-btn" data-fmt="pdf">PDF</button>
        </div>
      </div>

      <div class="row2">
        <button id="btn-export" class="btn primary">Export</button>
        <button id="btn-copy" class="btn">Copy</button>
      </div>
      <button id="btn-studio" class="btn accent">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
        Open in Studio (crop, edit, math for AI)
      </button>
      <button id="btn-again" class="btn ghost">← Capture again</button>
      <p id="res-status" class="status"></p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
