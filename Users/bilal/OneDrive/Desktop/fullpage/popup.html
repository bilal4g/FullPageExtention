<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapScroll Pro</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- Main view (kept simple) -->
  <div id="main-view" class="view active">
    <div class="header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="url(#lg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><defs><linearGradient id="lg" x1="0" y1="0" x2="24" y2="24"><stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/><path d="M8 14h8"/></svg>
        <h1>SnapScroll Pro</h1>
      </div>
      <div class="subtitle">Capture → opens the Studio automatically</div>
    </div>

    <div class="format-section">
      <span class="format-label">Format</span>
      <div class="format-buttons">
        <button class="format-btn active" data-format="png">PNG</button>
        <button class="format-btn" data-format="pdf">PDF</button>
      </div>
    </div>

    <button id="capture-btn" class="capture-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      Capture Full Page
    </button>

    <button id="more-btn" class="secondary-btn" style="margin-top:12px">⚙ More settings</button>

    <div class="footer">Works on any website</div>
  </div>

  <!-- Progress view -->
  <div id="progress-view" class="view">
    <div class="header"><div class="logo"><h1>Capturing…</h1></div></div>
    <div class="progress-container">
      <svg class="progress-ring" width="100" height="100">
        <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="6"/>
        <circle id="progress-ring-fill" cx="50" cy="50" r="42" fill="none" stroke="url(#pg)" stroke-width="6" stroke-linecap="round" stroke-dasharray="263.9" stroke-dashoffset="263.9"/>
        <defs><linearGradient id="pg" x1="0" y1="0" x2="100" y2="100"><stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
      </svg>
      <span id="progress-percent" class="progress-percent">0%</span>
    </div>
    <div id="progress-status" class="progress-status">Preparing…</div>
  </div>

  <!-- Result view (kept as fallback; Studio opens automatically) -->
  <div id="result-view" class="view">
    <div class="result-preview"><canvas id="preview-canvas"></canvas></div>
    <div id="result-info" class="result-info">Opening Studio…</div>
    <button id="studio-btn" class="capture-btn" style="margin-bottom:8px">Open in Studio</button>
    <button id="download-btn" class="capture-btn download-btn"><span id="download-label">Download PNG</span></button>
    <button id="retry-btn" class="secondary-btn">Capture Again</button>
  </div>

  <!-- Error view -->
  <div id="error-view" class="view">
    <div class="error-icon">⚠️</div>
    <div id="error-message" class="error-message"></div>
    <button id="back-btn" class="secondary-btn">Go Back</button>
  </div>

  <script src="popup.js"></script>
  <script src="studio-bridge.js"></script>
</body>
</html>
