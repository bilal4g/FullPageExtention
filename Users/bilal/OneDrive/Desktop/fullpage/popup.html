<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapScroll Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- MAIN VIEW -->
  <div id="main-view" class="view active">
    <div class="header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="2" y="2" width="24" height="24" rx="6" stroke="url(#g1)" stroke-width="2.5"/>
          <circle cx="14" cy="14" r="5" stroke="url(#g1)" stroke-width="2"/>
          <circle cx="14" cy="14" r="2" fill="url(#g1)"/>
          <path d="M14 5V8M14 20V23M5 14H8M20 14H23" stroke="url(#g1)" stroke-width="1.5" stroke-linecap="round"/>
          <defs>
            <linearGradient id="g1" x1="0" y1="0" x2="28" y2="28">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#06b6d4"/>
            </linearGradient>
          </defs>
        </svg>
        <h1>SnapScroll Pro</h1>
      </div>
      <p class="subtitle">Full-page screenshot capture</p>
    </div>

    <div class="format-section">
      <span class="format-label">Format</span>
      <div class="format-buttons">
        <button class="format-btn active" data-format="png">PNG</button>
        <button class="format-btn" data-format="pdf">PDF</button>
      </div>
    </div>

    <button id="capture-btn" class="capture-btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="2" y="2" width="16" height="16" rx="3" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="10" cy="10" r="3.5" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      Capture Full Page
    </button>

    <div class="footer">
      <span>Works on any website</span>
    </div>
  </div>

  <!-- PROGRESS VIEW -->
  <div id="progress-view" class="view">
    <div class="progress-container">
      <svg class="progress-ring" width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="6"/>
        <circle id="progress-ring-fill" cx="50" cy="50" r="42" fill="none" stroke="url(#g2)" stroke-width="6" stroke-linecap="round" stroke-dasharray="264" stroke-dashoffset="264" transform="rotate(-90 50 50)"/>
        <defs>
          <linearGradient id="g2" x1="0" y1="0" x2="100" y2="100">
            <stop stop-color="#6366f1"/>
            <stop offset="1" stop-color="#06b6d4"/>
          </linearGradient>
        </defs>
      </svg>
      <span id="progress-percent" class="progress-percent">0%</span>
    </div>
    <p id="progress-status" class="progress-status">Preparing...</p>
  </div>

  <!-- RESULT VIEW -->
  <div id="result-view" class="view">
    <div class="result-preview">
      <canvas id="preview-canvas"></canvas>
    </div>
    <p id="result-info" class="result-info"></p>
    <button id="download-btn" class="capture-btn download-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M9 3v9M9 12l-3-3M9 12l3-3M3 15h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="download-label">Download PNG</span>
    </button>
    <button id="retry-btn" class="secondary-btn">Capture Again</button>
  </div>

  <!-- ERROR VIEW -->
  <div id="error-view" class="view">
    <div class="error-icon">⚠️</div>
    <div id="error-message" class="error-message"></div>
    <button id="back-btn" class="secondary-btn">Go Back</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
